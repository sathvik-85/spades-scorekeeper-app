<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Input Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0d0d1a;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 32px;
    }

    h2 { font-size: 0.8rem; color: #7070a0; text-transform: uppercase; letter-spacing: 1.5px; }

    .demo-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .field-group { display: flex; flex-direction: column; gap: 6px; align-items: center; }

    .field-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #7070a0;
      align-self: flex-start;
    }

    /* ── PICKER WIDGET ── */
    .picker-widget {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #161628;
      border: 2px solid #252545;
      border-radius: 14px;
      padding: 10px 10px;
      width: 100%;
      transition: border-color 0.15s;
    }

    .picker-widget.focused { border-color: #e94560; }

    /* +/- buttons */
    .pm-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #252545;
      border: none;
      color: #aaa;
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s, transform 0.08s;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }

    .pm-btn:active { background: #e94560; color: #fff; transform: scale(0.88); }

    /* vertical drum */
    .drum-wrap {
      flex: 1;
      height: 80px;
      overflow: hidden;
      position: relative;
      cursor: grab;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
    }

    .drum-wrap:active { cursor: grabbing; }

    /* fade top & bottom */
    .drum-wrap::before,
    .drum-wrap::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 28px;
      z-index: 2;
      pointer-events: none;
    }

    .drum-wrap::before { top: 0; background: linear-gradient(to bottom, #161628, transparent); }
    .drum-wrap::after  { bottom: 0; background: linear-gradient(to top, #161628, transparent); }

    /* center highlight bar */
    .drum-center {
      position: absolute;
      left: 0; right: 0;
      top: 50%;
      transform: translateY(-50%);
      height: 32px;
      border-top: 1px solid #e94560;
      border-bottom: 1px solid #e94560;
      pointer-events: none;
      z-index: 1;
    }

    .drum-track {
      display: flex;
      flex-direction: column;
      align-items: center;
      will-change: transform;
    }

    .drum-item {
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 700;
      color: #444466;
      transition: color 0.15s, font-size 0.15s;
      user-select: none;
      width: 100%;
    }

    .drum-item.active {
      color: #fff;
      font-size: 1.6rem;
    }
  </style>
</head>
<body>

<h2>Swipe or tap ＋ / －</h2>

<div class="demo-fields">
  <div class="field-group">
    <div class="field-label">Bid</div>
    <div class="picker-widget" id="pw-bid">
      <button class="pm-btn" data-target="bid" data-delta="-1">−</button>
      <div class="drum-wrap" id="drum-bid">
        <div class="drum-center"></div>
        <div class="drum-track" id="track-bid"></div>
      </div>
      <button class="pm-btn" data-target="bid" data-delta="1">＋</button>
    </div>
  </div>
  <div class="field-group">
    <div class="field-label">Tricks Won</div>
    <div class="picker-widget" id="pw-tricks">
      <button class="pm-btn" data-target="tricks" data-delta="-1">−</button>
      <div class="drum-wrap" id="drum-tricks">
        <div class="drum-center"></div>
        <div class="drum-track" id="track-tricks"></div>
      </div>
      <button class="pm-btn" data-target="tricks" data-delta="1">＋</button>
    </div>
  </div>
</div>

<script>
  const MAX = 13;
  const ITEM_H = 32;

  const drums = {
    bid:    { value: 0, track: null, wrap: null, widget: null },
    tricks: { value: 0, track: null, wrap: null, widget: null }
  };

  function vibrate() {
    if (navigator.vibrate) navigator.vibrate(18);
  }

  function buildDrum(key) {
    const d = drums[key];
    d.track  = document.getElementById('track-' + key);
    d.wrap   = document.getElementById('drum-' + key);
    d.widget = document.getElementById('pw-' + key);
    d.track.innerHTML = '';

    // padding items above and below so first/last can center
    const pad = 2;
    for (let i = -pad; i <= MAX + pad; i++) {
      const el = document.createElement('div');
      el.className = 'drum-item';
      el.textContent = i < 0 ? '' : i > MAX ? '' : i;
      d.track.appendChild(el);
    }
    d.pad = pad;
    setDrumValue(key, d.value, false);
  }

  function setDrumValue(key, val, vib = true) {
    const d = drums[key];
    val = Math.max(0, Math.min(MAX, val));
    d.value = val;

    // center offset: wrap height / 2 - ITEM_H/2 - val * ITEM_H
    const wrapH = d.wrap.clientHeight || 80;
    const offset = (wrapH / 2) - (ITEM_H / 2) - (val + d.pad) * ITEM_H;
    d.track.style.transition = vib ? 'transform 0.18s cubic-bezier(0.25,0.46,0.45,0.94)' : 'none';
    d.track.style.transform  = `translateY(${offset}px)`;

    // update active class
    d.track.querySelectorAll('.drum-item').forEach((el, i) => {
      el.classList.toggle('active', i === val + d.pad);
    });

    if (vib) vibrate();
  }

  // ── SWIPE LOGIC ──────────────────────────────────────────
  function attachSwipe(key) {
    const d = drums[key];
    let startY = 0, lastY = 0, startVal = 0, dragging = false;

    function onStart(e) {
      dragging = true;
      startY = lastY = e.touches ? e.touches[0].clientY : e.clientY;
      startVal = d.value;
      d.widget.classList.add('focused');
      d.track.style.transition = 'none';
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      const y = e.touches ? e.touches[0].clientY : e.clientY;
      const dy = startY - y;
      const newVal = Math.round(startVal + dy / ITEM_H);
      if (newVal !== d.value) setDrumValue(key, newVal);
      lastY = y;
    }

    function onEnd() {
      if (!dragging) return;
      dragging = false;
      d.widget.classList.remove('focused');
      setDrumValue(key, d.value); // snap
    }

    d.wrap.addEventListener('touchstart',  onStart, { passive: true });
    d.wrap.addEventListener('touchmove',   onMove,  { passive: false });
    d.wrap.addEventListener('touchend',    onEnd);
    d.wrap.addEventListener('mousedown',   onStart);
    window.addEventListener('mousemove',   onMove);
    window.addEventListener('mouseup',     onEnd);
  }

  // ── +/- BUTTONS ──────────────────────────────────────────
  document.querySelectorAll('.pm-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const key   = btn.dataset.target;
      const delta = parseInt(btn.dataset.delta);
      setDrumValue(key, drums[key].value + delta);
    });
  });

  // ── INIT ─────────────────────────────────────────────────
  Object.keys(drums).forEach(k => { buildDrum(k); attachSwipe(k); });
</script>
</body>
</html>
